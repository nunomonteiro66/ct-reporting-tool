# Gets only the name and id of each category (and the total, limit, ...)
query CategoriesNames($limit: Int = 500, $offset: Int = 0) {
  categories(limit: $limit, offset: $offset) {
    results {
      id
      name(locale: "en") #!!! we assume that all have english names
      ancestors {
        name(locale: "en")
      }
    }
    total
    count
  }
}