query Categories($limit: Int = 500, $offset: Int = 0) {
  categories(limit: $limit, offset: $offset, where: "parent is defined") {
    results {
      key
      name(acceptLanguage: "en")
      custom {
        customFieldsRaw(includeNames: "facetAttributes") {
          value
        }
      }
      parent {
        key
        name(acceptLanguage: "en")
      }
    }
  }
}
