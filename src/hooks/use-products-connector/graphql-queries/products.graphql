query Products($limit: Int = 500, $offset: Int = 0, $skus: [String!]) {
  products(limit: $limit, offset: $offset, skus: $skus) {
    results {
      masterData {
        current {
          nameAllLocales {
            locale
            value
          }
          descriptionAllLocales {
            value
            locale
          }
          allVariants {
            sku
            attributesRaw {
              name
              value
            }
            images {
              url
              label
            }
            assets {
              sources {
                uri
              }
              custom {
                customFieldsRaw {
                  value
                  name
                }
              }
            }
          }
          categories {
            name(locale: "en")
            parent {
              name(locale: "en")
            }
          }
        }
      }
      id
      key
      productType {
        id
        key
        name
      }
      productSelectionRefs {
        results {
          productSelection {
            name(locale: "en")
            key
          }
          variantSelection {
            skus
          }
        }
      }
    }
    count
    total
  }
}
