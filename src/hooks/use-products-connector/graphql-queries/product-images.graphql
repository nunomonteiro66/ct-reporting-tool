query ProductImages($limit: Int = 500, $offset: Int = 0) {
  products(limit: $limit, offset: $offset) {
    count
    offset
    total
    results {
      key
      productType {
        key
        name
      }
      masterData {
        current {
          name(acceptLanguage: "en")
          categories {
            name(acceptLanguage: "en")
          }
          allVariants {
            sku
            #only images (that are active) will have "nkt_imageOrder"
            assets {
              name(acceptLanguage: "en")
              custom {
                customFieldsRaw(includeNames: "nkt_imageOrder") {
                  name
                  value
                }
              }
              sources {
                uri
              }
            }
            images {
              url
            }
            attributesRaw(includeNames: "7_type") {
              name
              value
            }
          }
        }
      }
      productSelectionRefs {
        results {
          productSelection {
            name(locale: "en")
            key
          }
          variantSelection {
            skus
          }
        }
      }
    }
  }
}
