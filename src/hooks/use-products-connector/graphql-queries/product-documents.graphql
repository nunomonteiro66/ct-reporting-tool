query ProductDocuments($limit: Int = 500, $offset: Int = 0) {
  products(limit: $limit, offset: $offset) {
    count
    offset
    total
    results {
      productType {
        key
        name
      }
      masterData {
        current {
          name(acceptLanguage: "en")
          categories {
            name(acceptLanguage: "en")
          }
          allVariants {
            sku
            assets {
              tags
              sources {
                contentType
                uri
              }
              name(acceptLanguage: "en")
              custom {
                customFieldsRaw {
                  value
                  name
                }
              }
            }
            attributesRaw(includeNames: "7_type") {
              name
              value
            }
          }
        }
      }
    }
  }
}
