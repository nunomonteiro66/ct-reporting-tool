query ProductDocuments($limit: Int = 500, $offset: Int = 0, $skus: [String!]) {
  products(limit: $limit, offset: $offset, skus: $skus) {
    count
    offset
    total
    results {
      productType {
        key
        name
      }

      masterData {
        current {
          name(acceptLanguage: "en")
          categories {
            name(acceptLanguage: "en")
          }
          allVariants {
            key
            sku
            assets {
              tags
              sources {
                contentType
                uri
              }
              name(acceptLanguage: "en")
              custom {
                customFieldsRaw(
                  includeNames: [
                    "nkt_dOPDOCNumber"
                    "nkt_metadata_type"
                    "nkt_revisiononlyDOPDOC"
                  ]
                ) {
                  value
                  name
                }
              }
            }
            attributesRaw(includeNames: "7_type") {
              name
              value
            }
          }
        }
      }

      productSelectionRefs {
        results {
          productSelection {
            name(locale: "en")
            key
          }
          variantSelection {
            skus
          }
        }
      }
    }
  }
}
