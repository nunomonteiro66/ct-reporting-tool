query ProductTypes($limit: Int = 500, $offset: Int = 0) {
  productTypes(limit: $limit, offset: $offset) {
    total
    count
    offset
    results {
      name
    	key
      attributeDefinitions(limit: $limit, offset: $offset) {
        total
        offset
        results {
          label(acceptLanguage: "en")
          name
        }
      }
    }
  }
}