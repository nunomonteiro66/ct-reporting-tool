query ProductTypes($limit: Int = 500, $offset: Int = 0) {
  productTypes(limit: $limit, offset: $offset) {
    total
    count
    offset
    results {
      name
      key
      attributeDefinitions(limit: 500, offset: 0) {
        total
        offset
        results {
          label(acceptLanguage: "en")
          name
          inputTip(locale: "en") #input tip refers to UoM
        }
      }
    }
  }
}
