#fetch all the variants skus associated to the given product selection
query MyQuery($id: String, $limit: Int = 500, $offset: Int = 0) {
  productSelection(id: $id) {
    productRefs(limit: $limit, offset: $offset) {
      count
      results {
        variantSelection {
          skus
        }
      }
      offset
      total
    }
  }
}